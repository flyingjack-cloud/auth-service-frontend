name: Build

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build variables
        run: |
          echo "PROFILE=prod" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build auth-portal
        run: npm run build:auth

      - name: Build admin-portal
        run: npx ng build admin-portal --configuration production --base-href /admin/

      - name: Docker build auth-portal
        run: |
          docker build \
            -f Dockerfile.auth-portal \
            -t ${{ secrets.REGISTRY_URL }}/auth-portal:${{ env.PROFILE }}-${{ env.SHORT_SHA }} \
            .

      - name: Docker build admin-portal
        run: |
          docker build \
            -f Dockerfile.admin-portal \
            -t ${{ secrets.REGISTRY_URL }}/admin-portal:${{ env.PROFILE }}-${{ env.SHORT_SHA }} \
            .

      - name: Docker login
        run: |
          if [ -n "${{ secrets.REGISTRY_USERNAME }}" ]; then
            echo "${{ secrets.REGISTRY_PASSWORD }}" | \
              docker login ${{ secrets.REGISTRY_URL }} \
              -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
          else
            echo "REGISTRY_USERNAME not set, skipping login (unauthenticated registry)"
          fi

      - name: Docker push auth-portal
        run: docker push ${{ secrets.REGISTRY_URL }}/auth-portal:${{ env.PROFILE }}-${{ env.SHORT_SHA }}

      - name: Docker push admin-portal
        run: docker push ${{ secrets.REGISTRY_URL }}/admin-portal:${{ env.PROFILE }}-${{ env.SHORT_SHA }}

      # ---- Gitee（当前启用）----
      - name: Update gitops image tags (Gitee)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          AUTH_PORTAL_IMAGE: ${{ secrets.REGISTRY_URL }}/auth-portal:${{ env.PROFILE }}-${{ env.SHORT_SHA }}
          ADMIN_PORTAL_IMAGE: ${{ secrets.REGISTRY_URL }}/admin-portal:${{ env.PROFILE }}-${{ env.SHORT_SHA }}
          OVERLAY: frontend/auth-service-frontend/overlays/${{ env.PROFILE }}
        run: |
          git clone https://oauth2:${GITEE_TOKEN}@gitee.com/zuminli/k8s-gitops.git
          cd k8s-gitops
          sed -i "s|image: .*auth-portal.*|image: ${AUTH_PORTAL_IMAGE}|" "${OVERLAY}/auth-portal-patch.yaml"
          sed -i "s|image: .*admin-portal.*|image: ${ADMIN_PORTAL_IMAGE}|" "${OVERLAY}/admin-portal-patch.yaml"
          git config user.email "ci@flyingjack.com"
          git config user.name "CI Bot"
          git add "${OVERLAY}/auth-portal-patch.yaml" "${OVERLAY}/admin-portal-patch.yaml"
          if git diff --cached --quiet; then
            echo "Image tags unchanged, nothing to push"
          else
            git commit -m "chore(auth-service-frontend): update images to ${{ env.PROFILE }}-${{ env.SHORT_SHA }}"
            git push
          fi

