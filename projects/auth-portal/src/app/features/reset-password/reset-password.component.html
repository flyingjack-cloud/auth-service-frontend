<mat-card class="reset-card">
  <mat-card-header>
    <mat-card-title>找回密码</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <sh-error-alert [message]="errorMessage()" />

    @if (successMessage()) {
      <div class="success-notice">{{ successMessage() }}</div>
    }

    <div class="type-toggle">
      <mat-button-toggle-group [value]="resetType()" (change)="resetType.set($event.value)">
        <mat-button-toggle value="email">邮箱验证</mat-button-toggle>
        <mat-button-toggle value="phone">手机验证</mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="code-row">
        <mat-form-field appearance="outline" class="principal-field">
          <mat-label>{{ principalLabel }}</mat-label>
          <input
            matInput
            formControlName="principal"
            [type]="resetType() === 'email' ? 'email' : 'tel'"
          />
        </mat-form-field>

        <button
          mat-stroked-button
          type="button"
          [disabled]="!canSendCode() || principalControl.invalid"
          (click)="sendCode()"
          class="send-code-btn"
        >
          {{ codeCountdown() > 0 ? codeCountdown() + 's' : '发送验证码' }}
        </button>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>验证码</mat-label>
        <input matInput formControlName="code" maxlength="6" autocomplete="one-time-code" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>新密码（8-16位）</mat-label>
        <input matInput formControlName="password" type="password" autocomplete="new-password" />
      </mat-form-field>

      <sh-loading-button [loading]="loading()" [disabled]="form.invalid" (clicked)="onSubmit()" class="submit-btn">
        重置密码
      </sh-loading-button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">返回登录</a>
    </div>
  </mat-card-content>
</mat-card>

<style>
  .reset-card { width: 100%; max-width: 490px; }

  .type-toggle { margin-bottom: 20px; display: flex; justify-content: center; }

  .full-width { width: 100%; margin-bottom: 4px; }

  .code-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 4px; }
  .code-row .principal-field { flex: 1; }
  .code-row .send-code-btn {
    margin-top: 4px;
    white-space: nowrap;
    min-width: 100px;
    font-family: var(--font-display, 'Exo 2', sans-serif) !important;
    font-weight: 500 !important;
    font-size: 13px !important;
    border-radius: 8px !important;
    border-color: var(--tech-border, rgba(2, 132, 199, 0.18)) !important;
    color: var(--tech-primary, #0284c7) !important;
  }

  .submit-btn { width: 100%; margin-top: 10px; }
  .submit-btn ::ng-deep button { width: 100%; height: 44px; font-size: 15px; letter-spacing: 0.8px; }

  .success-notice {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #f0fdf4, #dcfce7);
    border: 1px solid rgba(34, 197, 94, 0.2);
    color: #15803d;
    font-size: 14px;
    font-family: var(--font-body, 'DM Sans', sans-serif);
    text-align: center;
  }

  .auth-links {
    margin-top: 20px;
    text-align: center;
    padding-top: 16px;
    border-top: 1px solid var(--tech-border-subtle, rgba(14, 165, 233, 0.1));
  }

  .auth-links a {
    font-size: 13.5px;
    font-family: var(--font-display, 'Exo 2', sans-serif);
    font-weight: 500;
    color: var(--tech-primary, #0284c7);
    text-decoration: none;
    letter-spacing: 0.2px;
    transition: color 0.15s ease;
  }

  .auth-links a:hover { color: var(--tech-accent, #06b6d4); }
</style>
