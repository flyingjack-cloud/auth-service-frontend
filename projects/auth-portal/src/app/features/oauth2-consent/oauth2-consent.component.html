<div class="consent-container">
  <mat-card class="consent-card">
    <mat-card-header>
      <mat-icon mat-card-avatar>apps</mat-icon>
      <mat-card-title>授权请求</mat-card-title>
      <mat-card-subtitle>{{ clientId }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <sh-error-alert [message]="errorMessage()" />

      <p class="consent-intro">
        <strong>{{ clientId }}</strong> 请求访问您的账号，包含以下权限：
      </p>

      <mat-list>
        @for (s of scopeList; track s) {
          <mat-list-item>
            <mat-icon matListItemIcon>check_circle</mat-icon>
            <span matListItemTitle>{{ s }}</span>
          </mat-list-item>
        }
      </mat-list>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-stroked-button (click)="deny()" [disabled]="loading()">
        拒绝
      </button>
      <button mat-raised-button color="primary" (click)="authorize()" [disabled]="loading()">
        @if (loading()) {
          <mat-spinner diameter="18" />
        } @else {
          授权
        }
      </button>
    </mat-card-actions>
  </mat-card>
</div>

<style>
  .consent-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    position: relative;
    overflow: hidden;
    isolation: isolate;
    background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 40%, #c8eafa 100%);
  }

  .consent-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(2, 132, 199, 0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(2, 132, 199, 0.055) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: -1;
  }

  .consent-card {
    width: 100%;
    max-width: 440px;
  }

  .consent-intro {
    margin: 0 0 10px;
    font-size: 14px;
    font-family: var(--font-body, 'DM Sans', sans-serif);
    color: var(--tech-text-muted, #475569);
    line-height: 1.6;
  }
</style>
