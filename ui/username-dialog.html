<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Change username — Auth UI Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#F2F2F5;
  --color-border-primary:#C9C9D1;
  --color-border-tertiary:#E8E8ED;
  --color-text-primary:#1C1C21;
  --color-text-secondary:#65656E;
  --color-text-tertiary:#94949D;
  --color-text-success:#0F6E56;
  --color-text-danger:#C4314B;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --border-radius-xl:16px;
}
*{box-sizing:border-box}
body{margin:0;padding:24px;background:var(--color-background-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--color-text-primary)}
input{padding:9px 12px;border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);font-size:14px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary)}
input:focus{outline:2px solid #534AB7;outline-offset:-1px}
button{font-family:inherit;background:var(--color-background-primary);border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);padding:8px 14px;font-size:14px;color:var(--color-text-primary);cursor:pointer}
button:disabled{cursor:default}
.sugg{font-size:12px;color:#534AB7;background:#EEEDFE;padding:4px 12px;border-radius:999px;cursor:pointer;border:none}
</style>
</head>
<body>
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2.5rem 1rem; position: relative; display: flex; justify-content: center; align-items: center; min-height: 380px;">
  <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.35); border-radius: var(--border-radius-lg);"></div>

  <div role="dialog" aria-labelledby="dlg-title" style="position: relative; background: var(--color-background-primary); border-radius: var(--border-radius-xl); padding: 1.5rem; width: 100%; max-width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,0.2);">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;">
      <p id="dlg-title" style="font-size: 16px; font-weight: 500; margin: 0;">Change username</p>
      <i class="ti ti-x" style="font-size: 18px; color: var(--color-text-tertiary); cursor: pointer;" aria-hidden="true"></i>
    </div>
    <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 1.25rem; line-height: 1.5;">Your current username is <strong>maya_r</strong>. You can change it once every 30 days.</p>

    <label for="uname" style="display: block; font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px;">New username</label>
    <div style="position: relative;">
      <input id="uname" type="text" placeholder="3–20 characters" style="width: 100%; padding-right: 34px;">
      <span id="uicon" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 16px;"></span>
    </div>
    <p id="umsg" style="font-size: 12px; margin: 6px 0 0; min-height: 16px; color: var(--color-text-tertiary);">Letters, numbers and underscores only</p>

    <div id="usugg" style="display: none; margin-top: 8px;">
      <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 6px;">Available alternatives:</p>
      <div style="display: flex; gap: 6px; flex-wrap: wrap;">
        <button class="sugg" onclick="pick('maya_2026')">maya_2026</button>
        <button class="sugg" onclick="pick('maya_sg')">maya_sg</button>
        <button class="sugg" onclick="pick('the_real_maya')">the_real_maya</button>
      </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
      <button style="flex: 1;">Cancel</button>
      <button id="usave" style="flex: 1; background: #534AB7; color: #fff; border: none; padding: 10px 0; font-weight: 500; opacity: 0.5;" disabled>Save</button>
    </div>
  </div>
</div>
<script>
const inp = document.getElementById('uname'), icon = document.getElementById('uicon'),
      msg = document.getElementById('umsg'), sugg = document.getElementById('usugg'),
      save = document.getElementById('usave');
const taken = ['maya', 'maya_r', 'admin', 'test'];
let deb;
function setSave(ok) { save.disabled = !ok; save.style.opacity = ok ? '1' : '0.5'; }
function pick(name) { inp.value = name; check(name); }
function check(v) {
  sugg.style.display = 'none';
  if (!v) { icon.textContent = ''; msg.textContent = 'Letters, numbers and underscores only'; msg.style.color = 'var(--color-text-tertiary)'; setSave(false); return; }
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(v)) {
    icon.innerHTML = '<i class="ti ti-alert-circle" style="color: var(--color-text-danger);"></i>';
    msg.textContent = '3–20 characters; letters, numbers and underscores only';
    msg.style.color = 'var(--color-text-danger)'; setSave(false); return;
  }
  icon.innerHTML = '<i class="ti ti-loader-2" style="color: var(--color-text-tertiary);"></i>';
  msg.textContent = 'Checking availability…'; msg.style.color = 'var(--color-text-tertiary)'; setSave(false);
  clearTimeout(deb);
  deb = setTimeout(() => {
    if (taken.includes(v.toLowerCase())) {
      icon.innerHTML = '<i class="ti ti-x" style="color: var(--color-text-danger);"></i>';
      msg.textContent = '"' + v + '" is already taken'; msg.style.color = 'var(--color-text-danger)';
      sugg.style.display = 'block'; setSave(false);
    } else {
      icon.innerHTML = '<i class="ti ti-check" style="color: var(--color-text-success);"></i>';
      msg.textContent = '"' + v + '" is available'; msg.style.color = 'var(--color-text-success)';
      setSave(true);
    }
  }, 600);
}
inp.addEventListener('input', () => check(inp.value.trim()));
</script>
</body>
</html>
