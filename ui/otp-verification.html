<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verify code — Auth UI Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#F2F2F5;
  --color-border-primary:#C9C9D1;
  --color-border-tertiary:#E8E8ED;
  --color-text-primary:#1C1C21;
  --color-text-secondary:#65656E;
  --color-text-tertiary:#94949D;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --border-radius-xl:16px;
}
*{box-sizing:border-box}
body{margin:0;padding:24px;background:var(--color-background-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--color-text-primary)}
button{font-family:inherit;background:var(--color-background-primary);border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);padding:8px 14px;font-size:14px;color:var(--color-text-primary);cursor:pointer}
button:disabled{cursor:default}
.otp{width:44px;height:52px;text-align:center;font-size:20px;font-weight:500;border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.otp:focus{outline:none;border:2px solid #534AB7}
.otp.filled{border-color:#534AB7}
</style>
</head>
<body>
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2.5rem 1rem; display: flex; justify-content: center;">
  <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-xl); padding: 2rem 1.75rem; width: 100%; max-width: 380px; text-align: center;">
    <div style="width: 48px; height: 48px; border-radius: 50%; background: #EEEDFE; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
      <i class="ti ti-device-mobile-message" style="font-size: 22px; color: #534AB7;" aria-hidden="true"></i>
    </div>
    <p style="font-size: 20px; font-weight: 500; margin: 0 0 4px;">Enter verification code</p>
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1.5rem; line-height: 1.5;">We sent a 6-digit code to +65 •••• 4567</p>

    <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 8px;" id="otp-row">
      <input class="otp" maxlength="1" inputmode="numeric" aria-label="Digit 1">
      <input class="otp" maxlength="1" inputmode="numeric" aria-label="Digit 2">
      <input class="otp" maxlength="1" inputmode="numeric" aria-label="Digit 3">
      <input class="otp" maxlength="1" inputmode="numeric" aria-label="Digit 4">
      <input class="otp" maxlength="1" inputmode="numeric" aria-label="Digit 5">
      <input class="otp" maxlength="1" inputmode="numeric" aria-label="Digit 6">
    </div>
    <p id="otp-msg" style="font-size: 12px; color: var(--color-text-tertiary); margin: 0 0 1.25rem; min-height: 16px;">Code expires in 10 minutes</p>

    <button id="verify-btn" style="width: 100%; background: #534AB7; color: #fff; border: none; padding: 10px 0; font-weight: 500; opacity: 0.5;" disabled>Verify</button>

    <p style="font-size: 12px; color: var(--color-text-secondary); margin: 1.25rem 0 0;">Didn't get the code? <span id="resend" style="color: var(--color-text-tertiary);">Resend in 28s</span></p>
    <p style="font-size: 12px; margin: 0.75rem 0 0;"><span style="color: #534AB7; cursor: pointer;">Use email link instead</span></p>
  </div>
</div>
<script>
const boxes = [...document.querySelectorAll('.otp')];
boxes.forEach((b, i) => {
  b.addEventListener('input', () => {
    b.value = b.value.replace(/\D/g, '');
    b.classList.toggle('filled', !!b.value);
    if (b.value && i < 5) boxes[i + 1].focus();
    const done = boxes.every(x => x.value);
    const btn = document.getElementById('verify-btn');
    btn.disabled = !done;
    btn.style.opacity = done ? '1' : '0.5';
    if (done) document.getElementById('otp-msg').textContent = 'Ready to verify';
  });
  b.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !b.value && i > 0) boxes[i - 1].focus();
  });
});
let t = 28;
const iv = setInterval(() => {
  t--;
  const el = document.getElementById('resend');
  if (t <= 0) { el.textContent = 'Resend code'; el.style.color = '#534AB7'; el.style.cursor = 'pointer'; clearInterval(iv); }
  else el.textContent = 'Resend in ' + t + 's';
}, 1000);
</script>
</body>
</html>
