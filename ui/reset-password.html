<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password — Auth UI Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#F2F2F5;
  --color-border-primary:#C9C9D1;
  --color-border-tertiary:#E8E8ED;
  --color-text-primary:#1C1C21;
  --color-text-secondary:#65656E;
  --color-text-tertiary:#94949D;
  --color-text-success:#0F6E56;
  --color-text-danger:#C4314B;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --border-radius-xl:16px;
}
*{box-sizing:border-box}
body{margin:0;padding:24px;background:var(--color-background-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--color-text-primary)}
input{padding:9px 12px;border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);font-size:14px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary)}
input:focus{outline:2px solid #534AB7;outline-offset:-1px}
button{font-family:inherit;background:var(--color-background-primary);border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);padding:8px 14px;font-size:14px;color:var(--color-text-primary);cursor:pointer}
button:disabled{cursor:default}
.lbl{display:block;font-size:12px;color:var(--color-text-secondary);margin:0 0 4px}
</style>
</head>
<body>
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2.5rem 1rem; display: flex; justify-content: center;">
  <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-xl); padding: 2rem 1.75rem; width: 100%; max-width: 380px;">
    <div style="width: 48px; height: 48px; border-radius: 50%; background: #EEEDFE; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
      <i class="ti ti-key" style="font-size: 22px; color: #534AB7;" aria-hidden="true"></i>
    </div>
    <p style="font-size: 20px; font-weight: 500; text-align: center; margin: 0 0 4px;">Reset your password</p>
    <p style="font-size: 13px; text-align: center; color: var(--color-text-secondary); margin: 0 0 1.5rem; line-height: 1.5;">We'll send a verification code to your email or phone</p>

    <label class="lbl" for="rid">Email or phone number</label>
    <input id="rid" type="text" placeholder="you@example.com or +65 8123 4567" style="width: 100%; margin-bottom: 12px;">

    <label class="lbl" for="rcode">Verification code</label>
    <div style="display: flex; gap: 8px; margin-bottom: 4px;">
      <input id="rcode" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit code" style="flex: 1; min-width: 0;">
      <button id="rsend" onclick="sendR()" style="font-size: 13px; padding: 0 14px; white-space: nowrap;">Send code</button>
    </div>
    <p id="rmsg" style="font-size: 12px; color: var(--color-text-tertiary); margin: 0 0 12px; min-height: 30px; line-height: 1.4;">The code expires in 10 minutes</p>

    <label class="lbl" for="np">New password</label>
    <input id="np" type="password" placeholder="••••••••" style="width: 100%; margin-bottom: 4px;">
    <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0 0 12px;">8+ characters, one number, one symbol</p>

    <label class="lbl" for="cp">Confirm new password</label>
    <input id="cp" type="password" placeholder="••••••••" style="width: 100%; margin-bottom: 4px;">
    <p id="cmsg" style="font-size: 12px; margin: 0 0 1.25rem; min-height: 16px; color: var(--color-text-tertiary);"></p>

    <button id="rbtn" style="width: 100%; background: #534AB7; color: #fff; border: none; padding: 10px 0; font-weight: 500; opacity: 0.5;" disabled>Reset password</button>

    <p style="font-size: 12px; text-align: center; margin: 1.25rem 0 0;"><span style="color: #534AB7; cursor: pointer;"><i class="ti ti-arrow-left" style="font-size: 13px; vertical-align: -2px;" aria-hidden="true"></i> Back to sign in</span></p>
  </div>
</div>
<script>
let rcd = 0, riv;
function sendR() {
  if (rcd > 0) return;
  const msg = document.getElementById('rmsg');
  if (!document.getElementById('rid').value.trim()) {
    msg.textContent = 'Enter your email or phone number first';
    msg.style.color = 'var(--color-text-danger)'; return;
  }
  msg.textContent = 'If an account exists for this email or phone, a verification code has been sent.';
  msg.style.color = 'var(--color-text-secondary)';
  const btn = document.getElementById('rsend');
  rcd = 30; btn.disabled = true; btn.textContent = 'Resend 30s';
  riv = setInterval(() => {
    rcd--;
    btn.textContent = rcd > 0 ? 'Resend ' + rcd + 's' : 'Send code';
    if (rcd <= 0) { btn.disabled = false; clearInterval(riv); }
  }, 1000);
}
function validate() {
  const np = document.getElementById('np').value, cp = document.getElementById('cp').value,
        code = document.getElementById('rcode').value, cmsg = document.getElementById('cmsg');
  let ok = false;
  if (cp && np !== cp) { cmsg.textContent = 'Passwords do not match'; cmsg.style.color = 'var(--color-text-danger)'; }
  else if (cp && np === cp) { cmsg.textContent = 'Passwords match'; cmsg.style.color = 'var(--color-text-success)'; ok = true; }
  else { cmsg.textContent = ''; }
  const ready = ok && code.length === 6;
  const btn = document.getElementById('rbtn');
  btn.disabled = !ready; btn.style.opacity = ready ? '1' : '0.5';
}
['np','cp','rcode'].forEach(id => document.getElementById(id).addEventListener('input', validate));
</script>
</body>
</html>
